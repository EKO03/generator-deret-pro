<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Deret Pro</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    padding:20px;
}

.main-card{
    border:none;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.title{
    font-weight:700;
    font-size:2rem;
}

.subtitle{
    color:#6c757d;
}

.stat-card{
    border-radius:15px;
    border:none;
}

.btn{
    border-radius:12px;
}

.table-container{
    max-height:500px;
    overflow:auto;
}

.dark-mode{
    background:#0a0a0a !important;
}

.dark-mode .main-card{
    background:#1a1a1a;
    color:white;
}

.dark-mode .form-control,
.dark-mode .form-select{
    background:#2b2b2b;
    color:white;
    border-color:#444;
}

.dark-mode .table{
    color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card main-card">

<div class="card-body p-4">

<div class="text-center mb-4">

<h1 class="title">
🔢 Generator Deret Pro
</h1>

<p class="subtitle">
BigInt • Excel • PWA • Dark Mode
</p>

</div>

<div class="row">

<div class="col-md-4">

<label class="form-label">
Angka Awal
</label>

<input
type="text"
id="awal"
class="form-control"
placeholder="Contoh: 3211111111111111">

</div>

<div class="col-md-4">

<label class="form-label">
Kelipatan
</label>

<input
type="text"
id="kelipatan"
class="form-control"
placeholder="Contoh: 2">

</div>

<div class="col-md-4">

<label class="form-label">
Jumlah Deret
</label>

<input
type="number"
id="jumlah"
class="form-control"
placeholder="Contoh: 100">

</div>

</div>

<div class="row mt-3">

<div class="col-md-4">

<label class="form-label">
Arah Deret
</label>

<select
id="arah"
class="form-select">

<option value="naik">
Naik (+)
</option>

<option value="turun">
Turun (-)
</option>

</select>

</div>

</div>

<hr>

<div class="d-flex flex-wrap gap-2">

<button
class="btn btn-primary"
onclick="generate()">
Generate
</button>

<button
class="btn btn-success"
onclick="copyAll()">
Copy All
</button>

<button
class="btn btn-warning"
onclick="saveExcel()">
Save Excel
</button>

<button
class="btn btn-danger"
onclick="resetData()">
Reset
</button>

<button
class="btn btn-dark"
onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

<button
id="installBtn"
class="btn btn-success"
style="display:none;">
📱 Install App
</button>

<div
id="loading"
class="mt-3 text-primary"
style="display:none;">

⏳ Sedang membuat data...

</div>

</div>

<hr>

<div class="row">

<div class="col-md-4">

<div class="card stat-card bg-primary text-white">

<div class="card-body text-center py-3">

<h6>Total Data</h6>

<h4 id="totalData">0</h4>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card stat-card bg-success text-white">

<div class="card-body text-center py-3">

<h6>Angka Pertama</h6>

<small id="angkaPertama">-</small>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card stat-card bg-warning">

<div class="card-body text-center py-3">

<h6>Angka Terakhir</h6>

<small id="angkaTerakhir">-</small>

</div>

</div>

</div>

</div>

<div class="table-container mt-4">

<table
id="tabelHasil"
class="table table-striped table-bordered">

<thead class="table-dark">

<tr>

<th width="80">No</th>

<th>Angka</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

let dataDeret = [];

function generate(){

document.getElementById(
"loading"
).style.display = "block";

    let awalInput =
    document.getElementById("awal").value.trim();

    let kelipatanInput =
    document.getElementById("kelipatan").value.trim();

    let jumlah =
    Number(
        document.getElementById("jumlah").value
    );

    let arah =
    document.getElementById("arah").value;

    if(
        !awalInput ||
        !kelipatanInput ||
        !jumlah
    ){
        alert(
            "Lengkapi semua input"
        );
        return;
    }

    if(jumlah > 100000){

        alert(
            "Maksimal 100.000 data"
        );

        return;
    }

    let awal = BigInt(
        awalInput
    );

    let kelipatan = BigInt(
        kelipatanInput
    );

    let tbody =
    document.querySelector(
        "#tabelHasil tbody"
    );

    tbody.innerHTML = "";

    dataDeret = [];

    for(
        let i = 0;
        i < jumlah;
        i++
    ){

        let angka;

        if(
            arah === "naik"
        ){

            angka =
            awal +
            (
                BigInt(i)
                *
                kelipatan
            );

        }else{

            angka =
            awal -
            (
                BigInt(i)
                *
                kelipatan
            );

        }

        let angkaString =
        angka.toString();

        dataDeret.push(
            angkaString
        );

        tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${angkaString}</td>
        </tr>
        `;

    }

    document.getElementById(
        "totalData"
    ).textContent =
    dataDeret.length;

    document.getElementById(
        "angkaPertama"
    ).textContent =
    dataDeret[0];

    document.getElementById(
        "angkaTerakhir"
    ).textContent =
    dataDeret[
        dataDeret.length - 1
    ];

document.getElementById(
"loading"
).style.display = "none";

}

function copyAll(){

    if(
        dataDeret.length === 0
    ){
        alert(
            "Generate dahulu"
        );
        return;
    }

    navigator.clipboard.writeText(
        dataDeret.join("\n")
    );

    alert(
        "Berhasil dicopy"
    );

}

function resetData(){

    document.getElementById(
        "awal"
    ).value = "";

    document.getElementById(
        "kelipatan"
    ).value = "";

    document.getElementById(
        "jumlah"
    ).value = "";

    document.querySelector(
        "#tabelHasil tbody"
    ).innerHTML = "";

    document.getElementById(
        "totalData"
    ).textContent = 0;

    document.getElementById(
        "angkaPertama"
    ).textContent = "-";

    document.getElementById(
        "angkaTerakhir"
    ).textContent = "-";

    dataDeret = [];

}

function saveExcel(){

    if(
        dataDeret.length === 0
    ){
        alert(
            "Generate dahulu"
        );
        return;
    }

    let excelData =
    dataDeret.map(
        (
            angka,
            index
        )=>({

            No:index+1,

            Angka:
            "'" + angka

        })
    );

    let ws =
    XLSX.utils.json_to_sheet(
        excelData
    );

    let wb =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Deret"
    );

    XLSX.writeFile(
        wb,
        "Deret_Angka.xlsx"
    );

}

function toggleDarkMode(){

    document.body.classList.toggle(
        "dark-mode"
    );

}

document.getElementById(
"installBtn"
).addEventListener(
"click",
async ()=>{

    if(
        !deferredPrompt
    ) return;

    deferredPrompt.prompt();

    deferredPrompt = null;

});

let deferredPrompt;

window.addEventListener(
'beforeinstallprompt',
(event)=>{

    event.preventDefault();

    deferredPrompt = event;

    document.getElementById(
        "installBtn"
    ).style.display = "inline-block";

});

document.getElementById(
"installBtn"
).addEventListener(
"click",
async()=>{

    if(!deferredPrompt) return;

    deferredPrompt.prompt();

    deferredPrompt = null;

});

if(
    'serviceWorker'
    in navigator
){

    navigator.serviceWorker.register(
        'service-worker.js'
    );

}

</script>

</script>

</body>

</html>
